<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Player Awards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Add your custom styles here */
    </style>
</head>
<body>
    <div class="wrapper d-flex">
      

        <div class="main-content w-100">
            <!-- Navbar -->
          

            <div class="container-fluid py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 th:text="${pageTitle}">Player Awards</h1>
                    <a th:href="@{/admin/players}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Back to Players
                    </a>
                </div>

                <div class="card mb-4">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span>Awards for <span th:text="${player.firstName + ' ' + player.lastName}"></span></span>
                        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addAwardModal">
                            <i class="fas fa-plus me-1"></i> Add New Award
                        </button>
                    </div>
                    <div class="card-body">
                        <!-- Success/Error messages -->
                        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${param.success == 'add' ? 'Award added successfully!' : 
                                           param.success == 'update' ? 'Award updated successfully!' : 
                                           'Award deleted successfully!'}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>Award Name</th>
                                        <th>Date</th>
                                        <th>Type</th>
                                        <th>Description</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="award : ${awards}">
                                        <td th:text="${award.awardName}"></td>
                                        <td th:text="${#temporals.format(award.awardDate, 'yyyy-MM-dd')}"></td>
                                        <td>
                                            <span th:if="${award.teamAward}" class="badge bg-primary">Team Award</span>
                                            <span th:if="${!award.teamAward}" class="badge bg-info">Individual Award</span>
                                        </td>
                                        <td th:text="${award.description != null ? award.description : 'N/A'}"></td>
                                        <td>
                                            <a th:href="@{/admin/players/awards/edit/{id}(id=${award.awardId})}" 
                                               class="btn btn-sm btn-info me-2">
                                                <i class="fas fa-edit"></i> Edit
                                            </a>
                                            <a th:href="@{/admin/players/awards/delete/{id}(id=${award.awardId})}" 
                                               class="btn btn-sm btn-danger"
                                               onclick="return confirm('Are you sure you want to delete this award?');">
                                                <i class="fas fa-trash-alt"></i> Delete
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${awards.empty}">
                                        <td colspan="5" class="text-center">No awards found for this player.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Award Modal -->
    <div class="modal fade" id="addAwardModal" tabindex="-1" aria-labelledby="addAwardModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addAwardModalLabel">Add New Award</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/players/awards/add/{id}(id=${player.playerId})}" th:object="${newAward}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="awardName" class="form-label">Award Name:</label>
                            <input type="text" id="awardName" th:field="*{awardName}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="awardDate" class="form-label">Award Date:</label>
                            <input type="date" id="awardDate" th:field="*{awardDate}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description:</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" id="isTeamAward" th:field="*{teamAward}" class="form-check-input">
                            <label for="isTeamAward" class="form-check-label">Team Award</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Award</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        });
    </script>
</body>
</html>
