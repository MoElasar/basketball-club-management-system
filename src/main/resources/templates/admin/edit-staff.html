<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Edit Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --accent-color: #fdbb2d;
            --light-gray: #f8f9fa;
            --dark-gray: #343a40;
        }
        
        body {
            background-color: var(--light-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .sidebar {
            min-height: 100vh;
            background-color: var(--dark-gray);
            color: white;
            transition: all 0.3s;
        }
        
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 0.75rem 1rem;
            margin-bottom: 0.2rem;
        }
        
        .sidebar .nav-link:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar .nav-link.active {
            color: white;
            background-color: var(--primary-color);
        }
        
        .sidebar .nav-link i {
            margin-right: 0.5rem;
        }
        
        .main-content {
            padding: 20px;
        }
        
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .navbar-brand {
            font-weight: 700;
        }
        
        .staff-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                margin-left: -250px;
            }
            .sidebar.collapsed {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper d-flex">
        <!-- Sidebar (same as your original) -->
        <div class="sidebar">
            <!-- Your existing sidebar content -->
        </div>

        <div class="main-content w-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <!-- Your existing navbar content -->
            </nav>

            <div class="container-fluid py-4">
                <h1 class="mb-4" th:text="${pageTitle}"></h1>

                <div class="card mb-4">
                    <div class="card-header bg-white">
                        Edit Staff Member
                    </div>
                    <div class="card-body">
                        <!-- IMPORTANT: Add enctype="multipart/form-data" -->
                        <form th:action="@{/admin/staff/update/{id}(id=${staff.staffId})}" 
                              th:object="${staff}" 
                              method="post"
                              enctype="multipart/form-data">
                            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                <span th:text="${error}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">First Name:</label>
                                    <input type="text" id="firstName" th:field="*{firstName}" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Last Name:</label>
                                    <input type="text" id="lastName" th:field="*{lastName}" class="form-control" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="role" class="form-label">Role:</label>
                                    <select id="role" th:field="*{role}" class="form-control" required>
                                        <option value="">Select Role</option>
                                        <option th:each="role : ${staffRoles}" 
                                                th:value="${role}" 
                                                th:text="${role}"
                                                th:selected="${staff.role == role}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="hireDate" class="form-label">Hire Date:</label>
                                    <input type="date" id="hireDate" th:field="*{hireDate}" class="form-control">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="specialization" class="form-label">Specialization:</label>
                                    <input type="text" id="specialization" th:field="*{specialization}" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="profileImageFile" class="form-label">Profile Image:</label>
                                    <input type="file" id="profileImageFile" name="profileImageFile" class="form-control" accept="image/*">
                                    <small class="text-muted">Upload a new profile picture (JPG, PNG, etc.)</small>
                                    <!-- Show current image if exists -->
                                    <div th:if="${staff.profileImage}" class="mt-2">
                                        <img th:src="${staff.profileImage}" class="staff-image">
                                        <div class="form-check mt-2">
                                            <input class="form-check-input" type="checkbox" id="removeImage" name="removeImage">
                                            <label class="form-check-label" for="removeImage">Remove current image</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="team" class="form-label">Team:</label>
                                    <select id="team" name="teamId" class="form-control" required>
                                        <option value="">Select Team</option>
                                        <option th:each="team : ${teams}" 
                                                th:value="${team.teamId}" 
                                                th:text="${team.teamName}"
                                                th:selected="${staff.team != null and staff.team.teamId == team.teamId}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="user" class="form-label">Associated User (Optional):</label>
                                    <select id="user" name="userId" class="form-control">
                                        <option value="">No User</option>
                                        <option th:each="user : ${users}" 
                                                th:value="${user.id}" 
                                                th:text="${user.username}"
                                                th:selected="${staff.user != null and staff.user.id == user.id}"></option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Staff</button>
                            <a th:href="@{/admin/staff}" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        });
    </script>
</body>
</html>
