<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title th:text="${pageTitle}">Edit Contract</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<div class="container mt-4">
		<h2 th:text="${pageTitle}">Edit Contract</h2>

		<form th:action="@{/admin/players/contracts/update/{id}(id=${contract.contractId})}" th:object="${contract}"
			method="post" class="mt-3">

			<div class="mb-3">
				<label for="startDate" class="form-label">Start Date</label>
				<input type="date" th:field="*{startDate}" class="form-control" required>
			</div>

			<div class="mb-3">
				<label for="endDate" class="form-label">End Date</label>
				<input type="date" th:field="*{endDate}" class="form-control">
			</div>

			<div class="mb-3">
				<label for="salary" class="form-label">Salary</label>
				<input type="number" step="0.01" th:field="*{salary}" class="form-control" required>
			</div>

			<div class="mb-3">
				<label for="bonus" class="form-label">Bonus</label>
				<input type="number" step="0.01" th:field="*{bonus}" class="form-control">
			</div>

			<div class="mb-3">
				<label for="contractType" class="form-label">Contract Type</label>
				<select th:field="*{contractType}" class="form-select" required>
					<option th:each="type : ${contractTypes}" th:value="${type}" th:text="${type}">Type</option>
				</select>
			</div>

			<div class="mb-3">
				<label for="clauses" class="form-label">Clauses</label>
				<textarea th:field="*{clauses}" class="form-control" rows="4"></textarea>
			</div>

			<button type="submit" class="btn btn-primary">Update Contract</button>
			<a th:href="@{/admin/players/contracts/{playerId}(playerId=${contract.player.playerId})}"
				class="btn btn-secondary">Cancel</a>
		</form>
	</div>
</body>

</html>
