<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Merchandise Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  

    <div class="container mt-4">
        <h2>Merchandise Management</h2>
        
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        
        <a th:href="@{/admin/merchandise/add}" class="btn btn-primary mb-3">Add New Merchandise</a>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="merchandise : ${merchandiseList}">
                    <td th:text="${merchandise.merchandiseId}"></td>
                    <td th:text="${merchandise.itemName}"></td>
                    <td th:text="${merchandise.category}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(merchandise.price, 1, 2)}"></td>
                    <td th:text="${merchandise.stockQuantity}"></td>
                    <td>
                        <a th:href="@{/admin/merchandise/edit/{id}(id=${merchandise.merchandiseId})}" 
                           class="btn btn-sm btn-warning">Edit</a>
                        <a th:href="@{/admin/merchandise/delete/{id}(id=${merchandise.merchandiseId})}" 
                           class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
