<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">Player Contracts</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		.contract-active {
			background-color: rgba(40, 167, 69, 0.1);
		}

		.contract-expired {
			background-color: rgba(220, 53, 69, 0.1);
		}

		.contract-future {
			background-color: rgba(23, 162, 184, 0.1);
		}
	</style>
</head>

<body>
	<div class="wrapper d-flex">
		<!-- Sidebar -->


		<div class="main-content w-100">
			<!-- Navbar -->


			<div class="container-fluid py-4">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h1 th:text="${pageTitle}">Player Contracts</h1>
					<a th:href="@{/admin/players}" class="btn btn-secondary">
						<i class="fas fa-arrow-left me-1"></i> Back to Players
					</a>
				</div>

				<div class="card mb-4">
					<div class="card-header bg-white d-flex justify-content-between align-items-center">
						<span>Contracts for <span th:text="${player.firstName + ' ' + player.lastName}"></span></span>
						<button class="btn btn-sm btn-primary" data-bs-toggle="modal"
							data-bs-target="#addContractModal">
							<i class="fas fa-plus me-1"></i> Add New Contract
						</button>
					</div>
					<div class="card-body">
						<!-- Success/Error messages -->
						<div th:if="${param.success}" class="alert alert-success alert-dismissible fade show"
							role="alert">
							<span th:text="${param.success == 'add' ? 'Contract added successfully!' : 
                                           param.success == 'update' ? 'Contract updated successfully!' : 
                                           'Contract deleted successfully!'}"></span>
							<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
						</div>

						<div class="table-responsive">
							<table class="table table-striped table-hover">
								<thead>
									<tr>
										<th>Contract ID</th>
										<th>Start Date</th>
										<th>End Date</th>
										<th>Type</th>
										<th>Salary</th>
										<th>Bonus</th>
										<th>Status</th>
										<th>Actions</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="contract : ${contracts}">

										<td th:text="${contract.contractId}"></td>
										<td
											th:text="${contract.startDate != null ? #temporals.format(contract.startDate, 'yyyy-MM-dd') : 'N/A'}">
										</td>
										<td
											th:text="${contract.endDate != null ? #temporals.format(contract.endDate, 'yyyy-MM-dd') : 'N/A'}">
										</td>
										<td th:text="${contract.contractType}"></td>
										<td th:text="${'$' + #numbers.formatDecimal(contract.salary, 1, 2, 'COMMA')}">
										</td>
										<td th:text="${'$' + #numbers.formatDecimal(contract.bonus, 1, 2, 'COMMA')}">

											<td th:text="${contract.status}">Status</td>



										<td>
											<a th:href="@{/admin/players/contracts/edit/{id}(id=${contract.contractId})}"
												class="btn btn-sm btn-info me-2">
												<i class="fas fa-edit"></i> Edit
											</a>
											<a th:href="@{/admin/players/contracts/delete/{id}(id=${contract.contractId})}"
												class="btn btn-sm btn-danger"
												onclick="return confirm('Are you sure you want to delete this contract?');">
												<i class="fas fa-trash-alt"></i> Delete
											</a>
										</td>
									</tr>
									<tr th:if="${contracts.empty}">
										<td colspan="8" class="text-center">No contracts found for this player.</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Add Contract Modal -->
	<div class="modal fade" id="addContractModal" tabindex="-1" aria-labelledby="addContractModalLabel"
		aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="addContractModalLabel">Add New Contract</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<form th:action="@{/admin/players/contracts/add/{id}(id=${player.playerId})}" th:object="${newContract}"
					method="post">
					<div class="modal-body">
						<div class="mb-3">
							<label for="startDate" class="form-label">Start Date:</label>
							<input type="date" id="startDate" th:field="*{startDate}" class="form-control" required>
						</div>
						<div class="mb-3">
							<label for="endDate" class="form-label">End Date:</label>
							<input type="date" id="endDate" th:field="*{endDate}" class="form-control" required>
						</div>
						<div class="mb-3">
							<label for="contractType" class="form-label">Contract Type:</label>
							<select id="contractType" th:field="*{contractType}" class="form-control" required>
								<option value="">Select Type</option>
								<option th:each="type : ${contractTypes}" th:value="${type}" th:text="${type}"></option>
							</select>
						</div>
						<div class="mb-3">
							<label for="salary" class="form-label">Salary:</label>
							<div class="input-group">
								<span class="input-group-text">$</span>
								<input type="number" id="salary" th:field="*{salary}" class="form-control" step="0.01"
									min="0" required>
							</div>
						</div>
						<div class="mb-3">
							<label for="bonus" class="form-label">Bonus:</label>
							<div class="input-group">
								<span class="input-group-text">$</span>
								<input type="number" id="bonus" th:field="*{bonus}" class="form-control" step="0.01"
									min="0">
							</div>
						</div>
						<div class="mb-3">
							<label for="clauses" class="form-label">Special Clauses:</label>
							<textarea id="clauses" th:field="*{clauses}" class="form-control" rows="3"></textarea>
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
						<button type="submit" class="btn btn-primary">Add Contract</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		document.getElementById('sidebarToggle').addEventListener('click', function () {
			document.querySelector('.sidebar').classList.toggle('collapsed');
		});
	</script>
</body>

</html>
