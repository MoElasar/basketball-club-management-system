<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Staff Contracts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reuse the same styles as staff.html or customize as needed */
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --accent-color: #fdbb2d;
            --light-gray: #f8f9fa;
            --dark-gray: #343a40;
        }
        
        .contract-active {
            background-color: rgba(40, 167, 69, 0.1);
        }
        
        .contract-expired {
            background-color: rgba(220, 53, 69, 0.1);
        }
        
        .contract-future {
            background-color: rgba(23, 162, 184, 0.1);
        }
    </style>
</head>
<body>
    <div class="wrapper d-flex">
        <!-- Sidebar (same as in staff.html) -->
        

        <div class="main-content w-100">
            <!-- Navbar (same as in staff.html) -->
         

            <div class="container-fluid py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 th:text="${pageTitle}">Staff Contracts</h1>
                    <a th:href="@{/admin/staff}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Back to Staff
                    </a>
                </div>

                <div class="card mb-4">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span>Contracts for <span th:text="${staff.firstName + ' ' + staff.lastName}"></span></span>
                        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addContractModal">
                            <i class="fas fa-plus me-1"></i> Add New Contract
                        </button>
                    </div>
                    <div class="card-body">
                        <div th:if="${param.success == 'add'}" class="alert alert-success alert-dismissible fade show" role="alert">
                            Contract added successfully!
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <div th:if="${param.success == 'update'}" class="alert alert-success alert-dismissible fade show" role="alert">
                            Contract updated successfully!
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <div th:if="${param.success == 'delete'}" class="alert alert-warning alert-dismissible fade show" role="alert">
                            Contract deleted successfully!
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>Contract ID</th>
                                        <th>Start Date</th>
                                        <th>End Date</th>
                                        <th>Status</th>
                                        <th>Salary</th>
                                        <th>Benefits</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="contract : ${contracts}" 
                                        th:class="${#temporals.isBefore(contract.endDate, T(java.time.LocalDate).now())} ? 
                                                 'contract-expired' : 
                                                 (#temporals.isAfter(contract.startDate, T(java.time.LocalDate).now()) ? 
                                                 'contract-future' : 'contract-active'">
                                        <td th:text="${contract.contractId}"></td>
                                        <td th:text="${#temporals.format(contract.startDate, 'yyyy-MM-dd')}"></td>
                                        <td th:text="${#temporals.format(contract.endDate, 'yyyy-MM-dd')}"></td>
                                        <td>
                                            <span th:if="${#temporals.isBefore(contract.endDate, T(java.time.LocalDate).now())}" 
                                                  class="badge bg-danger">Expired</span>
                                            <span th:if="${#temporals.isAfter(contract.startDate, T(java.time.LocalDate).now())}" 
                                                  class="badge bg-info">Future</span>
                                            <span th:if="${!#temporals.isBefore(contract.endDate, T(java.time.LocalDate).now()) and 
                                                          !#temporals.isAfter(contract.startDate, T(java.time.LocalDate).now())}" 
                                                  class="badge bg-success">Active</span>
                                        </td>
                                        <td th:text="${'$' + #numbers.formatDecimal(contract.salary, 1, 2, 'COMMA')}"></td>
                                        <td th:text="${contract.benefits != null ? contract.benefits : 'N/A'}"></td>
                                        <td>
                                            <a th:href="@{/admin/staff/contracts/edit/{id}(id=${contract.contractId})}" 
                                               class="btn btn-sm btn-info me-2">
                                                <i class="fas fa-edit"></i> Edit
                                            </a>
                                            <a th:href="@{/admin/staff/contracts/delete/{id}(id=${contract.contractId})}" 
                                               class="btn btn-sm btn-danger"
                                               onclick="return confirm('Are you sure you want to delete this contract?');">
                                                <i class="fas fa-trash-alt"></i> Delete
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${contracts.empty}">
                                        <td colspan="7" class="text-center">No contracts found for this staff member.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Contract Modal -->
    <div class="modal fade" id="addContractModal" tabindex="-1" aria-labelledby="addContractModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addContractModalLabel">Add New Contract</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/staff//add/{id}(id=${staff.staffId})}" th:object="${newContract}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="startDate" class="form-label">Start Date:</label>
                            <input type="date" id="startDate" th:field="*{startDate}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="endDate" class="form-label">End Date:</label>
                            <input type="date" id="endDate" th:field="*{endDate}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="salary" class="form-label">Salary:</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" id="salary" th:field="*{salary}" class="form-control" 
                                       step="0.01" min="0" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="benefits" class="form-label">Benefits:</label>
                            <textarea id="benefits" th:field="*{benefits}" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Contract</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Same sidebar toggle script as in staff.html
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        });
    </script>
</body>
</html>
