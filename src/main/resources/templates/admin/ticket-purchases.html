<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Ticket Purchases</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --accent-color: #fdbb2d;
            --light-gray: #f8f9fa;
            --dark-gray: #343a40;
        }
        
        body {
            background-color: var(--light-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .sidebar {
            min-height: 100vh;
            background-color: var(--dark-gray);
            color: white;
            transition: all 0.3s;
        }
        
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 0.75rem 1rem;
            margin-bottom: 0.2rem;
        }
        
        .sidebar .nav-link:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar .nav-link.active {
            color: white;
            background-color: var(--primary-color);
        }
        
        .sidebar .nav-link i {
            margin-right: 0.5rem;
        }
        
        .main-content {
            padding: 20px;
        }
        
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .navbar-brand {
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                margin-left: -250px;
            }
            .sidebar.collapsed {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper d-flex">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="px-3 py-4">
                <h4 class="text-center mb-4">Basketball Club</h4>
                <hr class="my-2 bg-light">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/dashboard}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                    </li>
                    <!-- Other menu items -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/tickets}">
                            <i class="fas fa-ticket-alt"></i> Ticket Management
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin/ticket-purchases}">
                            <i class="fas fa-shopping-cart"></i> Ticket Purchases
                        </a>
                    </li>
                    <!-- Rest of menu items -->
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content w-100">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid">
                    <button class="btn btn-dark" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="navbar-collapse">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" 
                                   data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fas fa-user-circle me-1"></i>
                                    <span th:text="${currentUser.username}">Admin</span>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                    <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i> Profile</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item" th:href="@{/logout}"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div class="container-fluid py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 th:text="${pageTitle}">Ticket Purchases</h1>
                    <a th:href="@{/admin/ticket-purchases/new}" class="btn btn-primary">
                        <i class="fas fa-plus"></i> New Purchase
                    </a>
                </div>

                <!-- Success/Error Messages -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${param.success == 'created' ? 'Purchase created successfully!' : 
                                  (param.success == 'updated' ? 'Purchase updated successfully!' : 
                                  'Purchase deleted successfully!')}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${param.error == 'notFound' ? 'Purchase not found.' : 'An error occurred'}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card">
                    <div class="card-header bg-white">
                        All Ticket Purchases
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Customer</th>
                                        <th>Date</th>
                                        <th>Total Amount</th>
                                        <th>Payment Method</th>
                                        <th>Tickets</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="purchase : ${ticketPurchases}">
                                        <td th:text="${purchase.purchaseId}"></td>
                                        <td>
                                            <span th:if="${purchase.customer != null}" 
                                                  th:text="${purchase.customer.firstName + ' ' + purchase.customer.lastName}"></span>
                                            <span th:if="${purchase.customer == null}">N/A</span>
                                        </td>
                                        <td th:text="${#temporals.format(purchase.purchaseDateTime, 'yyyy-MM-dd HH:mm')}"></td>
                                        <td th:text="${'$' + #numbers.formatDecimal(purchase.totalAmount, 1, 2)}"></td>
                                        <td th:text="${purchase.paymentMethod}"></td>
                                        <td>
                                            <span th:text="${purchase.tickets != null ? purchase.tickets.size() : 0}"></span> tickets
                                        </td>
                                        <td>
                                            <a th:href="@{/admin/ticket-purchases/{id}(id=${purchase.purchaseId})}" 
                                               class="btn btn-sm btn-info me-2">
                                                <i class="fas fa-eye"></i> View
                                            </a>
                                            <a th:href="@{/admin/ticket-purchases/delete/{id}(id=${purchase.purchaseId})}" 
                                               class="btn btn-sm btn-danger"
                                               onclick="return confirm('Are you sure you want to delete this purchase?');">
                                                <i class="fas fa-trash-alt"></i> Delete
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${ticketPurchases == null or ticketPurchases.empty}">
                                        <td colspan="7" class="text-center">No purchases found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        });
    </script>
</body>
</html>
