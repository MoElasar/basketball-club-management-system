<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Purchase #' + purchase.purchaseId}">Purchase Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Same styles as above -->
</head>
<body>
    <div class="wrapper d-flex">
        <!-- Sidebar (same as above) -->
        
        <!-- Main Content -->
        <div class="main-content w-100">
            <!-- Navbar (same as above) -->

            <div class="container-fluid py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1>Purchase Details <span th:text="'#' + ${purchase.purchaseId}"></span></h1>
                    <a th:href="@{/admin/ticket-purchases}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Purchases
                    </a>
                </div>

                <div class="card mb-4">
                    <div class="card-header bg-white">
                        Purchase Information
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h5>Customer Details</h5>
                                <p th:if="${purchase.customer != null}">
                                    <strong>Name:</strong> 
                                    <span th:text="${purchase.customer.firstName + ' ' + purchase.customer.lastName}"></span><br>
                                    <strong>Email:</strong> 
                                    <span th:text="${purchase.customer.email}"></span><br>
                                    <strong>Phone:</strong> 
                                    <span th:text="${purchase.customer.phone != null ? purchase.customer.phone : 'N/A'}"></span>
                                </p>
                                <p th:if="${purchase.customer == null}">
                                    No customer information available
                                </p>
                            </div>
                            <div class="col-md-6">
                                <h5>Purchase Details</h5>
                                <p>
                                    <strong>Date:</strong> 
                                    <span th:text="${#temporals.format(purchase.purchaseDateTime, 'yyyy-MM-dd HH:mm')}"></span><br>
                                    <strong>Total Amount:</strong> 
                                    <span th:text="${'$' + #numbers.formatDecimal(purchase.totalAmount, 1, 2)}"></span><br>
                                    <strong>Payment Method:</strong> 
                                    <span th:text="${purchase.paymentMethod}"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span>Purchased Tickets</span>
                        <span class="badge bg-primary">
                            <span th:text="${purchase.tickets != null ? purchase.tickets.size() : 0}"></span> tickets
                        </span>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>Ticket ID</th>
                                        <th>Game</th>
                                        <th>Seat</th>
                                        <th>Section</th>
                                        <th>Price</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="ticket : ${purchase.tickets}">
                                        <td th:text="${ticket.ticketId}"></td>
                                        <td>
                                            <span th:if="${ticket.game != null}" 
                                                  th:text="${ticket.game.homeTeam.teamName + ' vs ' + ticket.game.awayTeam.teamName}"></span>
                                            <span th:if="${ticket.game == null}">N/A</span>
                                        </td>
                                        <td th:text="${ticket.seatNumber}"></td>
                                        <td th:text="${ticket.section}"></td>
                                        <td th:text="${'$' + #numbers.formatDecimal(ticket.price, 1, 2)}"></td>
                                    </tr>
                                    <tr th:if="${purchase.tickets == null or purchase.tickets.empty}">
                                        <td colspan="5" class="text-center">No tickets in this purchase</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Same scripts as above -->
</body>
</html>
