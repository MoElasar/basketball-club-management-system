<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">Edit Team</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		:root {
			--primary-color: #1a2a6c;
			--secondary-color: #b21f1f;
			--accent-color: #fdbb2d;
			--light-gray: #f8f9fa;
			--dark-gray: #343a40;
		}

		body {
			background-color: var(--light-gray);
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		.sidebar {
			min-height: 100vh;
			background-color: var(--dark-gray);
			color: white;
			transition: all 0.3s;
		}

		.sidebar .nav-link {
			color: rgba(255, 255, 255, 0.8);
			padding: 0.75rem 1rem;
			margin-bottom: 0.2rem;
		}

		.sidebar .nav-link:hover {
			color: white;
			background-color: rgba(255, 255, 255, 0.1);
		}

		.sidebar .nav-link.active {
			color: white;
			background-color: var(--primary-color);
		}

		.sidebar .nav-link i {
			margin-right: 0.5rem;
		}

		.main-content {
			padding: 20px;
		}

		.card {
			border: none;
			border-radius: 10px;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			transition: transform 0.3s;
		}

		.card:hover {
			transform: translateY(-5px);
		}

		.navbar-brand {
			font-weight: 700;
		}

		/* Optional: Adjust for smaller screens if sidebar collapses */
		@media (max-width: 768px) {
			.sidebar {
				margin-left: -250px;
				/* Hide sidebar by default on smaller screens */
			}

			.sidebar.collapsed {
				margin-left: 0;
				/* Show sidebar when toggled */
			}
		}
	</style>
</head>

<body>
	<div class="wrapper d-flex">
		<div class="sidebar">
			<div class="px-3 py-4">
				<h4 class="text-center mb-4">Basketball Club</h4>
				<hr class="my-2 bg-light">
				<ul class="nav flex-column">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/dashboard}">
							<i class="fas fa-tachometer-alt"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/users}">
							<i class="fas fa-users"></i> User Management
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link active" th:href="@{/admin/team}">
							<i class="fas fa-users"></i> Team Management
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/players}">
							<i class="fas fa-running"></i> Player Management
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/staff}">
							<i class="fas fa-user-tie"></i> Staff Management
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/games}">
							<i class="fas fa-basketball-ball"></i> Game Management
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/facilities}">
							<i class="fas fa-building"></i> Facility Management
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/tickets}">
							<i class="fas fa-ticket-alt"></i> Ticket Management
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/merchandise}">
							<i class="fas fa-tshirt"></i> Merchandise
						</a>
					</li>
				 
				</ul>
			</div>
		</div>

		<div class="main-content w-100">
			<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
				<div class="container-fluid">
					<button class="btn btn-dark" id="sidebarToggle">
						<i class="fas fa-bars"></i>
					</button>
					<div class="navbar-collapse">
						<ul class="navbar-nav ms-auto">
							<li class="nav-item dropdown">
								<a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
									data-bs-toggle="dropdown" aria-expanded="false">
									<i class="fas fa-user-circle me-1"></i>
									<span th:text="${currentUser.username}">Admin</span>
								</a>
								<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
									<li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i> Profile</a>
									</li>
									<li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i> Settings</a>
									</li>
									<li>
										<hr class="dropdown-divider">
									</li>
									<li><a class="dropdown-item" th:href="@{/logout}"><i
												class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
								</ul>
							</li>
						</ul>
					</div>
				</div>
			</nav>

			<div class="container-fluid py-4">
				<h1 class="mb-4" th:text="${pageTitle}"></h1>

				<div class="card mb-4">
					<div class="card-header bg-white">
						Edit Team Details
					</div>
					<div class="card-body">
						<form th:action="@{/admin/team/update/{id}(id=${team.teamId})}" th:object="${team}"
							method="post">
							<input type="hidden" th:field="*{teamId}" />

							<div class="mb-3">
								<label for="teamName" class="form-label">Team Name:</label>
								<input type="text" id="teamName" th:field="*{teamName}" class="form-control" required>
							</div>
							<div class="mb-3">
								<label for="city" class="form-label">City:</label>
								<input type="text" id="city" th:field="*{city}" class="form-control">
							</div>
							<div class="mb-3">
								<label for="homeArena" class="form-label">Home Arena:</label>
								<input type="text" id="homeArena" th:field="*{homeArena}" class="form-control">
							</div>
							<div class="mb-3">
								<label for="foundingDate" class="form-label">Founding Date:</label>
								<input type="date" id="foundingDate" th:field="*{foundingDate}" class="form-control">
							</div>
							<div class="mb-3">
								<label for="logoImage" class="form-label">Logo Image URL:</label>
								<input type="text" id="logoImage" th:field="*{logoImage}" class="form-control">
							</div>

							<button type="submit" class="btn btn-primary">Update Team</button>
							<a th:href="@{/admin/team}" class="btn btn-secondary">Cancel</a>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		// Toggle sidebar
		document.getElementById('sidebarToggle').addEventListener('click', function () {
			document.querySelector('.sidebar').classList.toggle('collapsed');
		});
	</script>
</body>

</html>
