<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">My Schedule</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		.game-card {
			border-left: 4px solid #198754;
			transition: transform 0.2s;
		}

		.game-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
		}

		.game-date {
			min-width: 120px;
		}
		
		.navbar-player {
				background-color: #003366;
				/* Dark blue background */
				color: #ffffff;
			}

			.navbar-player .navbar-brand {
				color: #ffffff;
				font-weight: bold;
			}

			.navbar-player .navbar-brand img {
				height: 30px;
				/* Adjust as needed */
			}

			.navbar-player .nav-link {
				color: rgba(255, 255, 255, 0.75);
				/* Lighter color for non-active links */
			}

			.navbar-player .nav-link:hover,
			.navbar-player .nav-link.active {
				color: #ffffff;
				/* White for active/hover links */
			}

			.navbar-player .dropdown-menu {
				background-color: #004080;
				/* Slightly lighter dark blue for dropdown */
				border: none;
			}

			.navbar-player .dropdown-item {
				color: rgba(255, 255, 255, 0.85);
			}

			.navbar-player .dropdown-item:hover {
				background-color: #0050a0;
				/* Even lighter blue on hover */
				color: #ffffff;
			}

			.navbar-player .dropdown-divider {
				border-color: rgba(255, 255, 255, 0.2);
			}

	</style>
</head>

<body>
	<nav class="navbar navbar-expand-lg navbar-dark navbar-player mb-4">
		<div class="container">
			<a class="navbar-brand d-flex align-items-center" th:href="@{/player/dashboard}">
				<img th:src="@{/images/logo-white.png}" alt="League Logo" class="me-2">
				<span>Player Portal</span>
			</a>

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#playerNavbar">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="playerNavbar">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/dashboard}">
							<i class="fas fa-tachometer-alt me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/schedule}">
							<i class="fas fa-calendar-alt me-1"></i> Schedule
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/stats}">
							<i class="fas fa-chart-line me-1"></i> Stats
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/team}">
							<i class="fas fa-users me-1"></i> Team
						</a>
					</li>
				</ul>

				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/logout}">
							<i class="fas fa-sign-out-alt me-1"></i> Logout
						</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2><i class="fas fa-calendar-alt me-2"></i>My Schedule</h2>
			<div>
				<a th:href="@{/player/dashboard}" class="btn btn-outline-secondary">
					<i class="fas fa-arrow-left me-1"></i> Back to Dashboard
				</a>
			</div>
		</div>

		<div class="card">
			<div class="card-header bg-primary text-white">
				<h5 class="mb-0">Game Schedule</h5>
			</div>
			<div class="card-body">
				<div th:if="${not schedule.isEmpty()}">
					<div class="table-responsive">
						<table class="table table-hover">
							<thead>
								<tr>
									<th>Date & Time</th>
									<th>Matchup</th>
									<th>Venue</th>
									<th>Status</th>
									<th>Actions</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="game : ${schedule}" class="game-card">
									<td class="game-date">
										<span
											th:text="${#temporals.format(game.gameDateTime, 'EEE, MMM dd')}"></span><br>
										<small class="text-muted"
											th:text="${#temporals.format(game.gameDateTime, 'h:mm a')}"></small>
									</td>
									<td>
										<strong
											th:text="${game.homeTeam?.teamName + ' vs ' + game.awayTeam?.teamName}"></strong>
									</td>
									<td>
										<span th:text="${game.venue}"></span>
									</td>
									<td>
										<span class="badge" th:switch="${game.status}">
                                            <span th:case="${T(com.learning.main.enm.GameStatus).SCHEDULED}" class="bg-info" th:text="${game.status}"></span>
                                            <span th:case="${T(com.learning.main.enm.GameStatus).IN_PROGRESS}" class="bg-warning" th:text="${game.status}"></span>
                                            <span th:case="${T(com.learning.main.enm.GameStatus).COMPLETED}" class="bg-success" th:text="${game.status}"></span>
                                            <span th:case="*" class="bg-secondary" th:text="${game.status}"></span> </span>
									</td>
									<td>
										<a th:href="@{/player/game/{id}(id=${game.gameId})}"
											class="btn btn-sm btn-outline-primary">
											<i class="fas fa-info-circle"></i> Details
										</a>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
				<div th:if="${schedule.isEmpty()}" class="alert alert-info">
					No games scheduled at this time.
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
