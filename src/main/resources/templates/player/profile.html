<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">My Profile</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		.profile-img {
			width: 200px;
			height: 200px;
			object-fit: cover;
			border-radius: 50%;
			border: 4px solid white;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
		}

		.profile-card {
			border-left: 4px solid #0d6efd;
		}

		.navbar-player {
			background-color: #003366;
			/* Dark blue background */
			color: #ffffff;
		}

		.navbar-player .navbar-brand {
			color: #ffffff;
			font-weight: bold;
		}

		.navbar-player .navbar-brand img {
			height: 30px;
			/* Adjust as needed */
		}

		.navbar-player .nav-link {
			color: rgba(255, 255, 255, 0.75);
			/* Lighter color for non-active links */
		}

		.navbar-player .nav-link:hover,
		.navbar-player .nav-link.active {
			color: #ffffff;
			/* White for active/hover links */
		}

		.navbar-player .dropdown-menu {
			background-color: #004080;
			/* Slightly lighter dark blue for dropdown */
			border: none;
		}

		.navbar-player .dropdown-item {
			color: rgba(255, 255, 255, 0.85);
		}

		.navbar-player .dropdown-item:hover {
			background-color: #0050a0;
			/* Even lighter blue on hover */
			color: #ffffff;
		}

		.navbar-player .dropdown-divider {
			border-color: rgba(255, 255, 255, 0.2);
		}
	</style>
</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-dark navbar-player mb-4">
		<div class="container">
			<a class="navbar-brand d-flex align-items-center" th:href="@{/player/dashboard}">
				<img th:src="@{/images/logo-white.png}" alt="League Logo" class="me-2">
				<span>Player Portal</span>
			</a>

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#playerNavbar">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="playerNavbar">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/dashboard}">
							<i class="fas fa-tachometer-alt me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/schedule}">
							<i class="fas fa-calendar-alt me-1"></i> Schedule
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/stats}">
							<i class="fas fa-chart-line me-1"></i> Stats
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/team}">
							<i class="fas fa-users me-1"></i> Team
						</a>
					</li>
				</ul>

				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/logout}">
							<i class="fas fa-sign-out-alt me-1"></i> Logout
						</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>


	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2><i class="fas fa-user-circle me-2"></i> My Profile</h2>
			<a th:href="@{/player/dashboard}" class="btn btn-outline-secondary">
				<i class="fas fa-arrow-left me-1"></i> Back to Dashboard
			</a>
		</div>

		<div class="row">
			<div class="col-md-4 mb-4">
				<div class="card profile-card">
					<div class="card-body text-center">
						<img th:if="${player.profileImage != null}" th:src="@{${player.profileImage}}"
							alt="Profile Image" class="profile-img mb-3">
						<img th:unless="${player.profileImage != null}" th:src="@{/images/default-player.png}"
							alt="Default Image" class="profile-img mb-3">

						<h4 th:text="${player.firstName + ' ' + player.lastName}">Player Name</h4>
						<p class="text-muted" th:text="${player.position}">Position</p>
						<p th:if="${player.team != null}">
							<i class="fas fa-users me-1"></i>
							<span th:text="${player.team.teamName}">Team Name</span>
						</p>
					</div>
				</div>
			</div>

			<div class="col-md-8">
				<div class="card profile-card">
					<div class="card-header bg-primary text-white">
						<h5 class="mb-0">Edit Profile</h5>
					</div>
					<div class="card-body">
						<form th:action="@{/player/profile}" th:object="${player}" method="post"
							enctype="multipart/form-data">

							<!-- Hidden playerId field (important for updates) -->
							<input type="hidden" th:field="*{playerId}" />

							<div class="row mb-3">
								<div class="col-md-6">
									<label for="firstName" class="form-label">First Name</label>
									<input type="text" class="form-control" id="firstName" th:field="*{firstName}"
										required>
								</div>
								<div class="col-md-6">
									<label for="lastName" class="form-label">Last Name</label>
									<input type="text" class="form-control" id="lastName" th:field="*{lastName}"
										required>
								</div>
							</div>

							<div class="row mb-3">
								<div class="col-md-6">
									<label for="dateOfBirth" class="form-label">Date of Birth</label>
									<input type="date" class="form-control" id="dateOfBirth" th:field="*{dateOfBirth}"
										required>
								</div>
								<div class="col-md-6">
									<label for="nationality" class="form-label">Nationality</label>
									<input type="text" class="form-control" id="nationality" th:field="*{nationality}">
								</div>
							</div>

							<div class="row mb-3">
								<div class="col-md-6">
									<label for="position" class="form-label">Position</label>
									<select class="form-select" id="position" th:field="*{position}">
										<option th:each="pos : ${positions}" th:value="${pos}" th:text="${pos}">
										</option>
									</select>
								</div>
								<div class="col-md-6">
									<label for="jerseyNumber" class="form-label">Jersey Number</label>
									<input type="number" class="form-control" id="jerseyNumber"
										th:field="*{jerseyNumber}">
								</div>
							</div>

							<div class="row mb-3">
								<div class="col-md-6">
									<label for="height" class="form-label">Height (cm)</label>
									<input type="number" step="0.1" class="form-control" id="height"
										th:field="*{height}">
								</div>
								<div class="col-md-6">
									<label for="weight" class="form-label">Weight (kg)</label>
									<input type="number" step="0.1" class="form-control" id="weight"
										th:field="*{weight}">
								</div>
							</div>

							<div class="mb-3">
								<label for="teamId" class="form-label">Team</label>
								<select class="form-select" id="teamId" name="teamId">
									<option value="">No Team</option>
									<option th:each="team : ${teams}" th:value="${team.teamId}"
										th:text="${team.teamName}"
										th:selected="${player.team != null and player.team.teamId == team.teamId}">
									</option>
								</select>
							</div>

							<div class="mb-3">
								<label for="imageFile" class="form-label">Profile Image</label>
								<input type="file" class="form-control" id="imageFile" name="imageFile"
									accept="image/*">
							</div>

							<div class="d-grid gap-2 d-md-flex justify-content-md-end">
								<button type="submit" class="btn btn-primary">
									<i class="fas fa-save me-1"></i> Save Changes
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
