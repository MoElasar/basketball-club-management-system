<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">My Statistics</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		.stat-card {
			border-left: 4px solid #0d6efd;
		}

		.stat-table th {
			background-color: #f8f9fa;
		}

		.navbar-player {
			background-color: #003366;
			/* Dark blue background */
			color: #ffffff;
		}

		.navbar-player .navbar-brand {
			color: #ffffff;
			font-weight: bold;
		}

		.navbar-player .navbar-brand img {
			height: 30px;
			/* Adjust as needed */
		}

		.navbar-player .nav-link {
			color: rgba(255, 255, 255, 0.75);
			/* Lighter color for non-active links */
		}

		.navbar-player .nav-link:hover,
		.navbar-player .nav-link.active {
			color: #ffffff;
			/* White for active/hover links */
		}

		.navbar-player .dropdown-menu {
			background-color: #004080;
			/* Slightly lighter dark blue for dropdown */
			border: none;
		}

		.navbar-player .dropdown-item {
			color: rgba(255, 255, 255, 0.85);
		}

		.navbar-player .dropdown-item:hover {
			background-color: #0050a0;
			/* Even lighter blue on hover */
			color: #ffffff;
		}

		.navbar-player .dropdown-divider {
			border-color: rgba(255, 255, 255, 0.2);
		}
	</style>
</head>

<body>
	<nav class="navbar navbar-expand-lg navbar-dark navbar-player mb-4">
		<div class="container">
			<a class="navbar-brand d-flex align-items-center" th:href="@{/player/dashboard}">
				<img th:src="@{/images/logo-white.png}" alt="League Logo" class="me-2">
				<span>Player Portal</span>
			</a>

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#playerNavbar">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="playerNavbar">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/dashboard}">
							<i class="fas fa-tachometer-alt me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/schedule}">
							<i class="fas fa-calendar-alt me-1"></i> Schedule
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/stats}">
							<i class="fas fa-chart-line me-1"></i> Stats
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/team}">
							<i class="fas fa-users me-1"></i> Team
						</a>
					</li>
				</ul>

				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/logout}">
							<i class="fas fa-sign-out-alt me-1"></i> Logout
						</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2><i class="fas fa-chart-bar me-2"></i>My Statistics</h2>
			<div>
				<a th:href="@{/player/dashboard}" class="btn btn-outline-secondary">
					<i class="fas fa-arrow-left me-1"></i> Back to Dashboard
				</a>
			</div>
		</div>

		<!-- Season Summary -->
		<div class="card mb-4">
			<div class="card-header bg-primary text-white">
				<h5 class="mb-0">Season Summary</h5>
			</div>
			<div class="card-body">
				<div class="row">
					<div class="col-md-3">
						<div class="card text-center stat-card">
							<div class="card-body">
								<h6 class="card-title">Points</h6>
								<p class="card-text display-4" th:text="${seasonStats.points} ?: '0'"></p>
								<p class="text-muted"
									th:text="${'Per game: ' + (seasonStats.points / (allStats.size() > 0 ? allStats.size() : 1))}">
								</p>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card text-center stat-card">
							<div class="card-body">
								<h6 class="card-title">Rebounds</h6>
								<p class="card-text display-4" th:text="${seasonStats.rebounds} ?: '0'"></p>
								<p class="text-muted"
									th:text="${'Per game: ' + (seasonStats.rebounds / (allStats.size() > 0 ? allStats.size() : 1))}">
								</p>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card text-center stat-card">
							<div class="card-body">
								<h6 class="card-title">Assists</h6>
								<p class="card-text display-4" th:text="${seasonStats.assists} ?: '0'"></p>
								<p class="text-muted"
									th:text="${'Per game: ' + (seasonStats.assists / (allStats.size() > 0 ? allStats.size() : 1))}">
								</p>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card text-center stat-card">
							<div class="card-body">
								<h6 class="card-title">FG%</h6>
								<p class="card-text display-4"
									th:text="${seasonStats.fieldGoalsAttempted > 0 ? 
                                   #numbers.formatDecimal((seasonStats.fieldGoalsMade / seasonStats.fieldGoalsAttempted) * 100, 1, 1) + '%' : '0%'}">
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Game-by-Game Stats -->
		<div class="card">
			<div class="card-header bg-primary text-white">
				<h5 class="mb-0">Game-by-Game Statistics</h5>
			</div>
			<div class="card-body">
				<div th:if="${not allStats.isEmpty()}">
					<div class="table-responsive">
						<table class="table table-hover stat-table">
							<thead>
								<tr>
									<th>Game</th>
									<th>Date</th>
									<th>PTS</th>
									<th>REB</th>
									<th>AST</th>
									<th>STL</th>
									<th>BLK</th>
									<th>FG%</th>
									<th>3P%</th>
									<th>FT%</th>
									<th>MIN</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="stat : ${allStats}">
									<td>
										<small
											th:text="${stat.game.homeTeam.teamName + ' vs ' + stat.game.awayTeam.teamName}"></small>
									</td>
									<td th:text="${#temporals.format(stat.game.gameDateTime, 'MMM dd')}"></td>
									<td th:text="${stat.points}"></td>
									<td th:text="${stat.rebounds}"></td>
									<td th:text="${stat.assists}"></td>
									<td th:text="${stat.steals}"></td>
									<td th:text="${stat.blocks}"></td>
									<td
										th:text="${stat.fieldGoalsAttempted > 0 ? 
                                        #numbers.formatDecimal((stat.fieldGoalsMade / stat.fieldGoalsAttempted) * 100, 1, 1) + '%' : '0%'}">
									</td>
									<td
										th:text="${stat.threePointsAttempted > 0 ? 
                                        #numbers.formatDecimal((stat.threePointsMade / stat.threePointsAttempted) * 100, 1, 1) + '%' : '0%'}">
									</td>
									<td
										th:text="${stat.freeThrowsAttempted > 0 ? 
                                        #numbers.formatDecimal((stat.freeThrowsMade / stat.freeThrowsAttempted) * 100, 1, 1) + '%' : '0%'}">
									</td>
									<td th:text="${stat.minutesPlayed}"></td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
				<div th:if="${allStats.isEmpty()}" class="alert alert-info">
					No game statistics available yet.
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
