<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">Game Details</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		/* Add any specific styles for this page */
		.game-detail-card {
			border-left: 5px solid #007bff;
		}

		/* Custom navbar styling (copied from previous turns for completeness) */
		.navbar-player {
			background-color: #003366;
			color: #ffffff;
		}

		.navbar-player .navbar-brand {
			color: #ffffff;
			font-weight: bold;
		}

		.navbar-player .navbar-brand img {
			height: 30px;
		}

		.navbar-player .nav-link {
			color: rgba(255, 255, 255, 0.75);
		}

		.navbar-player .nav-link:hover,
		.navbar-player .nav-link.active {
			color: #ffffff;
		}

		.navbar-player .dropdown-menu {
			background-color: #004080;
			border: none;
		}

		.navbar-player .dropdown-item {
			color: rgba(255, 255, 255, 0.85);
		}

		.navbar-player .dropdown-item:hover {
			background-color: #0050a0;
			color: #ffffff;
		}

		.navbar-player .dropdown-divider {
			border-color: rgba(255, 255, 255, 0.2);
		}
	</style>
</head>

<body>
	<nav class="navbar navbar-expand-lg navbar-dark navbar-player mb-4">
		<div class="container">
			<a class="navbar-brand d-flex align-items-center" th:href="@{/player/dashboard}">
				<img th:src="@{/images/logo-white.png}" alt="League Logo" class="me-2">
				<span>Player Portal</span>
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#playerNavbar">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="playerNavbar">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/dashboard}">
							<i class="fas fa-tachometer-alt me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link active" th:href="@{/player/schedule}">
							<i class="fas fa-calendar-alt me-1"></i> Schedule
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/stats}">
							<i class="fas fa-chart-line me-1"></i> Stats
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/player/team}">
							<i class="fas fa-users me-1"></i> Team
						</a>
					</li>
				</ul>
				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/logout}">
							<i class="fas fa-sign-out-alt me-1"></i> Logout
						</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>


	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2><i class="fas fa-basketball-ball me-2"></i>Game Details</h2>
			<div>
				<a th:href="@{/player/schedule}" class="btn btn-outline-secondary">
					<i class="fas fa-arrow-left me-1"></i> Back to Schedule
				</a>
			</div>
		</div>

		<div th:if="${game != null}" class="card game-detail-card mb-4">
			<div class="card-body">
				<h3 class="card-title text-primary"
					th:text="${game.homeTeam?.teamName + ' vs ' + game.awayTeam?.teamName}">Matchup</h3>
				<p class="card-text">
					<strong>Date & Time:</strong> <span
						th:text="${#temporals.format(game.gameDateTime, 'EEE, MMM dd, HH:mm')}"></span><br>
					<strong>Venue:</strong> <span th:text="${game.venue}"></span><br>
					<strong>Status:</strong>
					<span class="badge" th:switch="${game.status}">
						<span th:case="${T(com.learning.main.enm.GameStatus).SCHEDULED}" class="bg-info"
							th:text="${game.status}"></span>
						<span th:case="${T(com.learning.main.enm.GameStatus).IN_PROGRESS}" class="bg-warning"
							th:text="${game.status}"></span>
						<span th:case="${T(com.learning.main.enm.GameStatus).COMPLETED}" class="bg-success"
							th:text="${game.status}"></span>
						<span th:case="*" class="bg-secondary" th:text="${game.status}"></span> </span>
				</p>



				<div th:if="${playerStatsForGame != null}">
					<hr>
					<h5>Your Performance in this Game:</h5>
					<p><strong>Points:</strong> <span th:text="${playerStatsForGame.points}"></span></p>
					<p><strong>Rebounds:</strong> <span th:text="${playerStatsForGame.rebounds}"></span></p>
					<p><strong>Assists:</strong> <span th:text="${playerStatsForGame.assists}"></span></p>
				</div>

			</div>
		</div>
		<div th:unless="${game != null}" class="alert alert-warning">
			Game details not found.
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
