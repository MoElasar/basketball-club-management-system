<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">Buy Tickets</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		.ticket-card {
			transition: transform 0.2s;
		}

		.ticket-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
		}

		.game-info-card {
			margin-bottom: 20px;
		}
	</style>
</head>

<body>
	<nav th:fragment="customer_navbar" class="navbar navbar-expand-lg navbar-dark bg-info">
		<div class="container-fluid">
			<a class="navbar-brand" href="/customer/dashboard">Basketball Club</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
				data-bs-target="#customerNavbarContent" aria-controls="customerNavbarContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="customerNavbarContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" aria-current="page" th:href="@{/customer/dashboard}">
							<i class="fas fa-home me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/customer/tickets}">
							<i class="fas fa-ticket-alt me-1"></i> My Tickets
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/customer/merchandise}">
							<i class="fas fa-tshirt me-1"></i> Merchandise
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/customer/schedule}">
							<i class="fas fa-calendar-alt me-1"></i> Schedule
						</a>
					</li>
				</ul>
				<ul class="navbar-nav ms-auto">
					<li class="nav-item dropdown" th:if="${currentUser != null}">
						<a class="nav-link dropdown-toggle" href="#" id="customerNavbarDropdown" role="button"
							data-bs-toggle="dropdown" aria-expanded="false">
							<i class="fas fa-user-circle me-1"></i>
							<span th:text="${currentUser.username}"></span>
						</a>
						<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="customerNavbarDropdown">
							<li><a class="dropdown-item" th:href="@{/customer/profile}">
									<i class="fas fa-user me-1"></i> Profile
								</a></li>
							<li>
								<hr class="dropdown-divider">
							</li>
							<li><a class="dropdown-item" th:href="@{/logout}">
									<i class="fas fa-sign-out-alt me-1"></i> Logout
								</a></li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2><i class="fas fa-ticket-alt me-2"></i>Buy Tickets</h2>
			<a th:href="@{/customer/games/{id}(id=${game.gameId})}" class="btn btn-outline-secondary">
				<i class="fas fa-arrow-left me-1"></i> Back to Game
			</a>
		</div>

		<div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
			<span th:text="${param.error}">Error occurred</span>
			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>

		<div class="card game-info-card">
			<div class="card-header bg-primary text-white">
				<h5 class="mb-0" th:text="${game.homeTeam.teamName + ' vs ' + game.awayTeam.teamName}"></h5>
			</div>

			<div class="card-body">
				<div class="row">
					<div class="col-md-6">
						<p><strong>Date & Time:</strong>
							<span th:text="${#temporals.format(game.gameDateTime, 'EEE, MMM dd, yyyy h:mm a')}"></span>
						</p>
						<p><strong>Venue:</strong> <span th:text="${game.venue}"></span></p>
					</div>
					<div class="col-md-6">
						<p><strong>Status:</strong> <span th:text="${game.status}"></span></p>
					</div>
				</div>
			</div>
		</div>

		<div class="card">
			<div class="card-header bg-primary text-white">
				<h5 class="mb-0">Available Tickets</h5>
			</div>
			<div class="card-body">
				<div th:if="${not tickets.isEmpty()}" class="table-responsive">
					<table class="table table-hover">
						<thead>
							<tr>
								<th>Section</th>
								<th>Seat</th>
								<th>Price</th>
								<th>Status</th>
								<th>Action</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="ticket : ${tickets}">
								<td th:text="${ticket.section}"></td>
								<td th:text="${ticket.seatNumber}"></td>
								<td th:text="${'$' + #numbers.formatDecimal(ticket.price, 1, 2)}"></td>
								<td>
									<span class="badge bg-success" th:text="${ticket.status}"></span>
								</td>
								<td>
									<form th:action="@{/customer/tickets/purchase}" method="post">
										<input type="hidden" name="ticketId" th:value="${ticket.ticketId}">
										<button type="submit" class="btn btn-sm btn-success">
											<i class="fas fa-cart-plus"></i> Purchase
										</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
				<div th:if="${tickets.isEmpty()}" class="alert alert-info">
					No tickets currently available for this game.
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
