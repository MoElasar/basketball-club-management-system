<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Club News</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .news-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>
    <div th:replace="~{customer/dashboard :: customer_navbar}"></div>

    <div class="container mt-4">
        <h2 class="mb-4"><i class="fas fa-newspaper me-2"></i><span th:text="${pageTitle}"></span></h2>

        <div th:if="${newsArticles.isEmpty()}" class="alert alert-info" role="alert">
            No news articles available at the moment. Please check back later!
        </div>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="news : ${newsArticles}">
                <div class="card h-100 news-card">
                    <img th:if="${news.imageUrl != null and !news.imageUrl.isEmpty()}" th:src="${news.imageUrl}" class="card-img-top" alt="News Image" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">
                            <a th:href="@{/customer/news/{newsId}(newsId=${news.newsId})}" th:text="${news.title}" class="text-decoration-none">News Title</a>
                        </h5>
                        <p class="card-text text-muted small">
                            <i class="fas fa-calendar-alt me-1"></i> <span th:text="${#temporals.format(news.publishDate, 'MMM dd, yyyy')}"></span>
                            <span th:if="${news.author != null and !news.author.isEmpty()}">
                                | <i class="fas fa-user me-1"></i> <span th:text="${news.author}"></span>
                            </span>
                        </p>
                        <p class="card-text flex-grow-1" th:text="${#strings.abbreviate(news.content, 150)}"></p>
                        <div class="mt-auto">
                            <a th:href="@{/customer/news/{newsId}(newsId=${news.newsId})}" class="btn btn-primary btn-sm">Read More <i class="fas fa-arrow-right ms-1"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
