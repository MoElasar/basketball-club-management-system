<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">Game Schedule</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		.game-card {
			transition: transform 0.2s;
		}

		.game-card:hover {
			transform: translateY(-5px);
			box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
		}
	</style>
</head>

<body>
	<nav th:fragment="customer_navbar" class="navbar navbar-expand-lg navbar-dark bg-info">
		<div class="container-fluid">
			<a class="navbar-brand" href="/customer/dashboard">Basketball Club</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
				data-bs-target="#customerNavbarContent" aria-controls="customerNavbarContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="customerNavbarContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" aria-current="page" th:href="@{/customer/dashboard}">
							<i class="fas fa-home me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/customer/tickets}">
							<i class="fas fa-ticket-alt me-1"></i> My Tickets
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/customer/merchandise}">
							<i class="fas fa-tshirt me-1"></i> Merchandise
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/customer/schedule}">
							<i class="fas fa-calendar-alt me-1"></i> Schedule
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/customer/news}">
							<i class="fas fa-newspaper me-1"></i> News
						</a>
					</li>
				</ul>
				<ul class="navbar-nav ms-auto">
					<li class="nav-item dropdown" th:if="${currentUser != null}">
						<a class="nav-link dropdown-toggle" href="#" id="customerNavbarDropdown" role="button"
							data-bs-toggle="dropdown" aria-expanded="false">
							<i class="fas fa-user-circle me-1"></i>
							<span th:text="${currentUser.username}"></span>
						</a>
						<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="customerNavbarDropdown">
							<li><a class="dropdown-item" th:href="@{/customer/profile}">
									<i class="fas fa-user me-1"></i> Profile
								</a></li>
							<li>
								<hr class="dropdown-divider">
							</li>
							<li><a class="dropdown-item" th:href="@{/logout}">
									<i class="fas fa-sign-out-alt me-1"></i> Logout
								</a></li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<h2 class="mb-4"><i class="fas fa-calendar-alt me-2"></i>Upcoming Game Schedule</h2>

		<div th:if="${games.isEmpty()}" class="alert alert-info text-center" role="alert">
			<i class="fas fa-info-circle me-2"></i> No upcoming games scheduled at the moment. Please check back later!
		</div>

		<div class="row">
			<div class="col-md-4 mb-4" th:each="game : ${games}">
				<div class="card game-card h-100">
					<div class="card-header bg-primary text-white">
						<h5 class="card-title mb-0"
							th:text="${#temporals.format(game.gameDateTime, 'EEE, MMM dd, yyyy')}">Game Date</h5>
					</div>
					<div class="card-body">
						<h6 class="card-subtitle mb-2 text-muted" th:text="${game.venue}">Venue</h6>

						<div class="d-flex justify-content-between align-items-center mb-3">
							<div class="text-center">
								<span th:text="${game.homeTeam?.teamName}">Home Team</span>
							</div>
							<div class="text-center px-2">
								<span class="fw-bold">VS</span>
							</div>
							<div class="text-center">
								<span th:text="${game.awayTeam?.teamName}">Away Team</span>
							</div>
						</div>

						<p class="card-text">
							<i class="fas fa-clock me-2"></i>
							<span th:text="${#temporals.format(game.gameDateTime, 'h:mm a')}">Game Time</span>
						</p>
						<p class="card-text">
							<i class="fas fa-info-circle me-2"></i> Status: <span th:text="${game.status}"></span>
						</p>
					</div>
					<div class="card-footer bg-transparent d-flex justify-content-between align-items-center">
						<a th:href="@{/customer/games/{id}(id=${game.gameId})}" class="btn btn-sm btn-outline-primary">
							<i class="fas fa-info-circle"></i> Details
						</a>
						<a th:if="${game.status.name() == 'SCHEDULED'}"
							th:href="@{/customer/tickets/game/{id}(id=${game.gameId})}" class="btn btn-sm btn-primary">
							<i class="fas fa-ticket-alt"></i> Buy Tickets
						</a>
						<span th:if="${game.status.name() != 'SCHEDULED'}" class="badge bg-secondary">Tickets N/A</span>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
