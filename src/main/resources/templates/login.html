<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle}">Login - Basketball Club</title>
	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		:root {
			--primary-color: #1a2a6c;
			--secondary-color: #b21f1f;
			--accent-color: #fdbb2d;
			--light-color: #f8f9fa;
			--dark-color: #212529;
		}

		body {
			background-color: var(--light-color);
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			height: 100vh;
			display: flex;
			align-items: center;
		}

		.login-container {
			max-width: 500px;
			width: 100%;
			padding: 2rem;
			background-color: white;
			border-radius: 10px;
			box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
			margin: auto;
		}

		.login-header {
			text-align: center;
			margin-bottom: 2rem;
		}

		.login-header h2 {
			color: var(--primary-color);
			font-weight: 700;
			margin-bottom: 0.5rem;
		}

		.login-header p {
			color: #6c757d;
			margin-bottom: 0;
		}

		.login-icon {
			color: var(--accent-color);
			font-size: 3rem;
			margin-bottom: 1rem;
		}

		.form-control {
			padding: 0.75rem 1rem;
			border-radius: 8px;
			border: 1px solid #ced4da;
			transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
		}

		.form-control:focus {
			border-color: var(--primary-color);
			box-shadow: 0 0 0 0.25rem rgba(26, 42, 108, 0.25);
		}

		.btn-login {
			background-color: var(--secondary-color);
			border: none;
			padding: 0.75rem;
			font-weight: 600;
			width: 100%;
			color: white;
			transition: all 0.3s ease;
		}

		.btn-login:hover {
			background-color: #8a1919;
			transform: translateY(-2px);
		}

		.login-footer {
			text-align: center;
			margin-top: 1.5rem;
		}

		.login-footer a {
			color: var(--primary-color);
			text-decoration: none;
			font-weight: 500;
		}

		.login-footer a:hover {
			text-decoration: underline;
		}

		.alert {
			border-radius: 8px;
			padding: 0.75rem 1.25rem;
		}

		.form-check-input:checked {
			background-color: var(--primary-color);
			border-color: var(--primary-color);
		}

		.form-check-label {
			user-select: none;
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="login-container">
			<div class="login-header">
				<i class="fas fa-basketball-ball login-icon"></i>
				<h2>Welcome Back</h2>
				<p>Sign in to access your account</p>
			</div>

			<!-- Error Message -->
			<div th:if="${error}" class="alert alert-danger" role="alert">
				<i class="fas fa-exclamation-circle me-2"></i>
				<span th:text="${error}">Invalid credentials</span>
			</div>

			<!-- Success Message -->
			<div th:if="${message}" class="alert alert-success" role="alert">
				<i class="fas fa-check-circle me-2"></i>
				<span th:text="${message}">Success message</span>
			</div>

			<form th:action="@{/login}" method="post">
				<div class="mb-3">
					<label for="username" class="form-label">Username</label>
					<input type="text" class="form-control" id="username" name="username" required
						placeholder="Enter your username">
				</div>
				<div class="mb-3">
					<label for="password" class="form-label">Password</label>
					<input type="password" class="form-control" id="password" name="password" required
						placeholder="Enter your password">
				</div>
				<div class="mb-3 form-check">
					<input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
					<label class="form-check-label" for="remember-me">Remember me</label>
				</div>
				<button type="submit" class="btn btn-login mb-3">
					<i class="fas fa-sign-in-alt me-2"></i>Login
				</button>

				<div class="login-footer">
					<p class="mb-2">Don't have an account? <a th:href="@{/register}">Register here</a></p>
					<p class="mb-0"><a th:href="@{/forgot-password}">Forgot password?</a></p>
				</div>
			</form>
		</div>
	</div>

	<!-- Bootstrap JS Bundle with Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
