<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
	<nav th:fragment="staff_navbar" class="navbar navbar-expand-lg navbar-dark sticky-top">
		<div class="container-fluid">
			<a class="navbar-brand d-flex align-items-center" href="/staff/dashboard">
				<i class="fas fa-basketball-ball me-2"></i>
				<span>Staff Portal</span>
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#staffNavbarContent"
				aria-controls="staffNavbarContent" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="staffNavbarContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link active" aria-current="page" th:href="@{/staff/dashboard}">
							<i class="fas fa-tachometer-alt me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/staff/training-sessions}">
							<i class="fas fa-running me-1"></i> Training
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/staff/players}">
							<i class="fas fa-users me-1"></i> Players
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/staff/injuries}">
							<i class="fas fa-first-aid me-1"></i> Injuries
						</a>
					</li>
				</ul>
				<ul class="navbar-nav ms-auto">
					<li class="nav-item dropdown" th:if="${currentUser != null}">
						<a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="staffNavbarDropdown"
							role="button" data-bs-toggle="dropdown" aria-expanded="false">
							<div class="me-2 text-end d-none d-sm-block">
								<div class="fw-bold" th:text="${staff.firstName + ' ' + staff.lastName}"></div>
								<div>
									<span class="badge" th:classappend="${roleBadgeClass}"
										th:text="${staff.role}"></span>
								</div>
							</div>
							<!--<img th:src="${staff.profileImage} ?: '/images/default-staff.png'" alt="Profile"
									class="rounded-circle" width="40" height="40">-->
						</a>
						<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="staffNavbarDropdown">
							<li><a class="dropdown-item" th:href="@{/staff/profile}">
									<i class="fas fa-user-circle me-2"></i> Profile
								</a></li>
							<li><a class="dropdown-item" href="#">
									<i class="fas fa-cog me-2"></i> Settings
								</a></li>
							<li>
								<hr class="dropdown-divider">
							</li>
							<li><a class="dropdown-item" th:href="@{/logout}">
									<i class="fas fa-sign-out-alt me-2"></i> Logout
								</a></li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</nav>
</body>

</html>
