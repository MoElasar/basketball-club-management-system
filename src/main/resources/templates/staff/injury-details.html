<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Injury Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/staff_navbar :: staff_navbar}"></nav>

    <div class="container mt-5">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0" th:text="${pageTitle}">Injury Details</h5>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <h6>Player</h6>
                        <p th:text="${injury.player.firstName + ' ' + injury.player.lastName}"></p>
                    </div>
                    <div class="col-md-6">
                        <h6>Injury Type</h6>
                        <p th:text="${injury.injuryType}"></p>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <h6>Injury Date</h6>
                        <p th:text="${#temporals.format(injury.injuryDate, 'MMM dd, yyyy')}"></p>
                    </div>
                    <div class="col-md-6">
                        <h6>Expected Recovery Date</h6>
                        <p th:text="${injury.expectedRecoveryDate != null} ? 
                                   ${#temporals.format(injury.expectedRecoveryDate, 'MMM dd, yyyy')} : 'TBD'"></p>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <h6>Status</h6>
                        <span th:switch="${injury.status}" class="badge">
                            <span th:case="ACTIVE" class="badge bg-danger">Active</span>
                            <span th:case="RECOVERING" class="badge bg-warning">Recovering</span>
                            <span th:case="RECOVERED" class="badge bg-success">Recovered</span>
                            <span th:case="*" class="badge bg-secondary">Unknown</span>
                        </span>
                    </div>
                </div>
                
                <div class="mb-3">
                    <h6>Treatment Plan</h6>
                    <p th:text="${injury.treatmentPlan}"></p>
                </div>
                
                <div class="mb-3">
                    <h6>Notes</h6>
                    <p th:text="${injury.notes}"></p>
                </div>
                
                <a th:href="@{/staff/injuries}" class="btn btn-secondary">Back to List</a>
            </div>
        </div>
    </div>
</body>
</html>
